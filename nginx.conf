# Plantilla de Nginx para servir Flutter Web (SPA) en producción/Railway.
# ${PORT} lo resuelve envsubst al arrancar el contenedor (ver Dockerfile) —
# Railway inyecta su propio $PORT en runtime; localmente cae al ENV PORT=80
# del Dockerfile.

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para texto/JS/JSON/wasm (reduce tamaño de transferencia
    # del bundle de Flutter Web, que es lo más pesado de la carga inicial).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        font/woff2
        image/svg+xml;

    # Cabeceras de seguridad básicas.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # index.html y el entrypoint de Flutter (main.dart.js, flutter.js,
    # flutter_bootstrap.js, flutter_service_worker.js, version.json) deben
    # revalidarse siempre: `flutter build web` NO les pone un hash en el
    # nombre de archivo (a diferencia de apps con Vite/webpack), así que si
    # se cachean como "immutable" el navegador se queda para siempre con la
    # versión vieja de la app después de cada deploy, sin volver a pedirla
    # nunca — justo el bug que causó pantallas en blanco tras un fix.
    location ~* ^/(index\.html|main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|manifest\.json)$ {
        add_header Cache-Control "no-cache";
    }

    # El resto de assets (fuentes, imágenes, canvaskit/*.wasm, íconos) sí
    # pueden cachearse: cambian con poca frecuencia y, aunque tampoco tienen
    # hash en el nombre, un cache corto con revalidación es un balance
    # razonable entre rendimiento y no quedar pegado a una versión vieja.
    location ~* \.(?:js|css|wasm|png|jpg|jpeg|gif|svg|ico|json|woff2?)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Fallback de SPA: cualquier ruta que no sea un archivo real (las rutas
    # de go_router — /coordinator/dashboard, /teacher/grades, etc.) debe
    # devolver index.html para que Flutter Web resuelva el deep-link,
    # el refresh y el botón atrás/adelante del navegador del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
